<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 880" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="band-left" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2A5A8C"/>
      <stop offset="100%" stop-color="#4A7FA5"/>
    </linearGradient>
    <linearGradient id="band-right" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3A6A94"/>
      <stop offset="100%" stop-color="#1E3A5F"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1400" height="880" fill="#ffffff"/>

  <!-- ==================== TITLE — TOP LEFT ==================== -->
  <text x="50" y="40" font-size="13" font-weight="700" fill="#1A1814" letter-spacing="0.03em">Double Diamond</text>
  <text x="50" y="58" font-size="13" font-weight="400" fill="#8A8479" letter-spacing="0.03em">Air-Circulating Leg Brace for Rehabilitation</text>

  <!-- ==================== DIAMOND 1: Discover & Define ==================== -->
  <polygon points="100,310 340,90 340,530" fill="#B8D4EE" opacity="0.35"/>
  <polygon points="340,90 580,310 340,530" fill="#96BFE0" opacity="0.3"/>
  <line x1="340" y1="90" x2="340" y2="530" stroke="#4A7FA5" stroke-width="1" stroke-dasharray="6,4" opacity="0.3"/>

  <!-- ==================== DIAMOND 2: Develop & Deliver ==================== -->
  <polygon points="610,310 850,90 850,530" fill="#C4D8EA" opacity="0.35"/>
  <polygon points="850,90 1090,310 850,530" fill="#A4C0D8" opacity="0.3"/>
  <line x1="850" y1="90" x2="850" y2="530" stroke="#3A6A8C" stroke-width="1" stroke-dasharray="6,4" opacity="0.3"/>

  <!-- ==================== TEXT INSIDE DISCOVER ==================== -->
  <g>
    <text x="325" y="225" text-anchor="end" font-size="8.5" font-weight="700" fill="#2A5A8C">Understanding</text>
    <text x="325" y="238" text-anchor="end" font-size="8.5" font-weight="700" fill="#2A5A8C">Patient Pain Points</text>
    <text x="325" y="266" text-anchor="end" font-size="7.5" fill="#4A7A9E">User Interviews</text>
    <text x="325" y="279" text-anchor="end" font-size="7.5" fill="#4A7A9E">Clinical Observation</text>
    <text x="325" y="292" text-anchor="end" font-size="7.5" fill="#4A7A9E">Existing Brace Analysis</text>
    <text x="325" y="318" text-anchor="end" font-size="7.5" fill="#4A7A9E">Thermal Mapping</text>
    <text x="325" y="331" text-anchor="end" font-size="7.5" fill="#4A7A9E">Competitive Teardowns</text>
  </g>

  <!-- ==================== TEXT INSIDE DEFINE ==================== -->
  <g>
    <text x="355" y="225" font-size="8.5" font-weight="700" fill="#3468A0">Framing the</text>
    <text x="355" y="238" font-size="8.5" font-weight="700" fill="#3468A0">Airflow Challenge</text>
    <text x="355" y="266" font-size="7.5" fill="#4A7A9E">Heat &amp; Moisture Mapping</text>
    <text x="355" y="279" font-size="7.5" fill="#4A7A9E">Airflow Req. Spec</text>
    <text x="355" y="292" font-size="7.5" fill="#4A7A9E">Design Brief</text>
    <text x="355" y="318" font-size="7.5" fill="#4A7A9E">HMW Statement</text>
  </g>

  <!-- ==================== TEXT INSIDE DEVELOP ==================== -->
  <g>
    <text x="835" y="225" text-anchor="end" font-size="8.5" font-weight="700" fill="#3A6A8C">Designing &amp;</text>
    <text x="835" y="238" text-anchor="end" font-size="8.5" font-weight="700" fill="#3A6A8C">Prototyping</text>
    <text x="835" y="266" text-anchor="end" font-size="7.5" fill="#5A8AA4">Channel Geometry</text>
    <text x="835" y="279" text-anchor="end" font-size="7.5" fill="#5A8AA4">Form Studies</text>
    <text x="835" y="292" text-anchor="end" font-size="7.5" fill="#5A8AA4">Breathable Materials</text>
    <text x="835" y="318" text-anchor="end" font-size="7.5" fill="#5A8AA4">Component Analysis</text>
  </g>

  <!-- ==================== TEXT INSIDE DELIVER ==================== -->
  <g>
    <text x="865" y="225" font-size="8.5" font-weight="700" fill="#1E4A70">Validating &amp;</text>
    <text x="865" y="238" font-size="8.5" font-weight="700" fill="#1E4A70">Delivering</text>
    <text x="865" y="266" font-size="7.5" fill="#5A8AA4">Airflow Testing</text>
    <text x="865" y="279" font-size="7.5" fill="#5A8AA4">Wearability Evaluation</text>
    <text x="865" y="292" font-size="7.5" fill="#5A8AA4">Material Validation</text>
    <text x="865" y="318" font-size="7.5" fill="#5A8AA4">Clinical Feedback</text>
  </g>

  <!-- ==================== CENTER BANDS ==================== -->
  <rect x="100" y="542" width="480" height="26" rx="13" fill="url(#band-left)" opacity="0.9"/>
  <text x="340" y="560" text-anchor="middle" font-size="10" font-weight="700" fill="#fff" letter-spacing="0.12em">DISCOVER &amp; DEFINE</text>

  <rect x="610" y="542" width="480" height="26" rx="13" fill="url(#band-right)" opacity="0.9"/>
  <text x="850" y="560" text-anchor="middle" font-size="10" font-weight="700" fill="#fff" letter-spacing="0.12em">DEVELOP &amp; DELIVER</text>

  <!-- Center arrow between diamonds -->
  <line x1="584" y1="310" x2="604" y2="310" stroke="#2A5A8C" stroke-width="2"/>
  <polygon points="604,305 614,310 604,315" fill="#2A5A8C"/>

  <!-- Entry arrow -->
  <line x1="40" y1="310" x2="90" y2="310" stroke="#1A1814" stroke-width="1.5"/>
  <polygon points="90,305 100,310 90,315" fill="#1A1814"/>

  <!-- ==================== PHASE LABELS BELOW DIAMONDS ==================== -->
  <text x="220" y="580" text-anchor="middle" font-size="10" font-weight="700" fill="#2A5A8C" letter-spacing="0.06em">Phase 1: DISCOVER</text>
  <text x="460" y="580" text-anchor="middle" font-size="10" font-weight="700" fill="#3468A0" letter-spacing="0.06em">Phase 2: DEFINE</text>
  <text x="730" y="580" text-anchor="middle" font-size="10" font-weight="700" fill="#3A6A8C" letter-spacing="0.06em">Phase 3: DEVELOP</text>
  <text x="970" y="580" text-anchor="middle" font-size="10" font-weight="700" fill="#1E4A70" letter-spacing="0.06em">Phase 4: DELIVER</text>

  <!-- ==================== BOTTOM CONTENT ==================== -->
  <!-- DISCOVER -->
  <g transform="translate(128, 600)">
    <text x="0" y="18" font-size="9.5" font-weight="700" fill="#1A1814">Methods</text>
    <text x="0" y="33" font-size="8.5" fill="#5A7A90">User Interviews</text>
    <text x="0" y="45" font-size="7.5" fill="#7A9AAE" font-style="italic">(patients recovering from knee &amp; leg surgery)</text>
    <text x="0" y="60" font-size="8.5" fill="#5A7A90">Clinical Observation</text>
    <text x="0" y="72" font-size="7.5" fill="#7A9AAE" font-style="italic">(rehab facility visits &amp; brace usage patterns)</text>
    <text x="0" y="87" font-size="8.5" fill="#5A7A90">Existing Brace Analysis</text>
    <text x="0" y="99" font-size="7.5" fill="#7A9AAE" font-style="italic">(heat retention &amp; moisture trapping)</text>

    <text x="0" y="120" font-size="9.5" font-weight="700" fill="#1A1814">Activities</text>
    <text x="0" y="135" font-size="8.5" fill="#5A7A90">Thermal Mapping Studies</text>
    <text x="0" y="150" font-size="8.5" fill="#5A7A90">Competitive Teardowns</text>
    <text x="0" y="162" font-size="7.5" fill="#7A9AAE" font-style="italic">(50+ years of unchanged brace design)</text>

    <rect x="-6" y="176" width="185" height="36" rx="6" fill="#2A5A8C" opacity="0.08"/>
    <text x="4" y="191" font-size="8" font-weight="700" fill="#2A5A8C">Key Research Goal</text>
    <text x="4" y="203" font-size="7.5" fill="#2A5A8C">Map heat &amp; moisture failure points</text>
  </g>

  <!-- DEFINE -->
  <g transform="translate(368, 600)">
    <text x="0" y="18" font-size="9.5" font-weight="700" fill="#1A1814">Synthesis</text>
    <text x="0" y="33" font-size="8.5" fill="#5A7A90">Heat &amp; Moisture Journey Map</text>
    <text x="0" y="45" font-size="7.5" fill="#7A9AAE" font-style="italic">(hourly comfort degradation cycle)</text>
    <text x="0" y="60" font-size="8.5" fill="#5A7A90">Airflow Requirement Spec</text>
    <text x="0" y="72" font-size="7.5" fill="#7A9AAE" font-style="italic">(channel size, mesh porosity, flow rate)</text>

    <text x="0" y="93" font-size="9.5" font-weight="700" fill="#1A1814">Outputs</text>
    <text x="0" y="108" font-size="8.5" fill="#5A7A90">Product Design Brief</text>
    <text x="0" y="120" font-size="7.5" fill="#7A9AAE" font-style="italic">(passive cooling, no battery or hardware)</text>
    <text x="0" y="135" font-size="8.5" fill="#5A7A90">Problem Statement (HMW)</text>
    <text x="0" y="147" font-size="7.5" fill="#7A9AAE" font-style="italic">(step-powered airflow + breathable shell)</text>

    <rect x="-6" y="161" width="185" height="36" rx="6" fill="#3468A0" opacity="0.08"/>
    <text x="4" y="176" font-size="8" font-weight="700" fill="#3468A0">Key Define Goal</text>
    <text x="4" y="188" font-size="7.5" fill="#3468A0">Passive cooling without added complexity</text>
  </g>

  <!-- DEVELOP -->
  <g transform="translate(628, 600)">
    <text x="0" y="18" font-size="9.5" font-weight="700" fill="#1A1814">Methods</text>
    <text x="0" y="33" font-size="8.5" fill="#5A7A90">Channel Geometry Design</text>
    <text x="0" y="45" font-size="7.5" fill="#7A9AAE" font-style="italic">(internal airflow pathways &amp; routing)</text>
    <text x="0" y="60" font-size="8.5" fill="#5A7A90">Form Studies</text>
    <text x="0" y="72" font-size="7.5" fill="#7A9AAE" font-style="italic">(ergonomic shell contour &amp; fit)</text>
    <text x="0" y="87" font-size="8.5" fill="#5A7A90">Breathable Material Selection</text>
    <text x="0" y="99" font-size="7.5" fill="#7A9AAE" font-style="italic">(open-cell mesh &amp; moisture wicking)</text>
    <text x="0" y="114" font-size="8.5" fill="#5A7A90">Component Analysis</text>
    <text x="0" y="126" font-size="7.5" fill="#7A9AAE" font-style="italic">(compression pump mechanism)</text>

    <rect x="-6" y="140" width="185" height="36" rx="6" fill="#3A6A8C" opacity="0.08"/>
    <text x="4" y="155" font-size="8" font-weight="700" fill="#3A6A8C">Key Design Goal</text>
    <text x="4" y="167" font-size="7.5" fill="#3A6A8C">Step-powered airflow with zero hardware</text>
  </g>

  <!-- DELIVER -->
  <g transform="translate(868, 600)">
    <text x="0" y="18" font-size="9.5" font-weight="700" fill="#1A1814">Validation</text>
    <text x="0" y="33" font-size="8.5" fill="#5A7A90">Airflow Testing</text>
    <text x="0" y="45" font-size="7.5" fill="#7A9AAE" font-style="italic">(measuring CFM through brace channels)</text>
    <text x="0" y="60" font-size="8.5" fill="#5A7A90">Wearability Evaluation</text>
    <text x="0" y="72" font-size="7.5" fill="#7A9AAE" font-style="italic">(comfort over extended wear sessions)</text>

    <text x="0" y="93" font-size="9.5" font-weight="700" fill="#1A1814">Production</text>
    <text x="0" y="108" font-size="8.5" fill="#5A7A90">Material Validation</text>
    <text x="0" y="120" font-size="7.5" fill="#7A9AAE" font-style="italic">(mesh durability &amp; biocompatibility)</text>
    <text x="0" y="135" font-size="8.5" fill="#5A7A90">Clinical Feedback</text>
    <text x="0" y="147" font-size="7.5" fill="#7A9AAE" font-style="italic">(patient &amp; practitioner review)</text>

    <rect x="-6" y="161" width="185" height="48" rx="6" fill="#1E4A70" opacity="0.08"/>
    <text x="4" y="176" font-size="8" font-weight="700" fill="#1E4A70">Key Output</text>
    <text x="4" y="188" font-size="7.5" fill="#1E4A70">Validated air-circulating brace</text>
    <text x="4" y="200" font-size="7.5" fill="#1E4A70">ready for clinical trials</text>
  </g>

  <!-- ==================== SOLUTION CALLOUT ==================== -->
  <g transform="translate(1140, 70)">
    <rect x="0" y="0" width="220" height="300" rx="10" fill="#fff" stroke="#C4D4E0" stroke-width="1"/>
    <rect x="0" y="0" width="220" height="36" rx="10" fill="#2A5A8C" opacity="0.08"/>
    <text x="110" y="22" text-anchor="middle" font-size="9" font-weight="700" fill="#2A5A8C" letter-spacing="0.08em">THE SOLUTION</text>

    <text x="16" y="56" font-size="8.5" font-weight="600" fill="#1A1814">Air-Circulating Leg Brace</text>
    <text x="16" y="72" font-size="7.5" fill="#5A7A90">Passive cooling through step-powered</text>
    <text x="16" y="84" font-size="7.5" fill="#5A7A90">airflow and breathable materials</text>

    <line x1="16" y1="96" x2="204" y2="96" stroke="#C4D4E0" stroke-width="0.5"/>

    <text x="16" y="115" font-size="8" font-weight="600" fill="#2A5A8C">Channeled Airflow</text>
    <text x="16" y="129" font-size="7.5" fill="#5A7A90">Internal pathways move air passively</text>
    <text x="16" y="141" font-size="7.5" fill="#5A7A90">with each step the patient takes</text>

    <line x1="16" y1="152" x2="204" y2="152" stroke="#C4D4E0" stroke-width="0.5"/>

    <text x="16" y="170" font-size="8" font-weight="600" fill="#2A5A8C">Breathable Materials</text>
    <text x="16" y="184" font-size="7.5" fill="#5A7A90">Open-cell mesh replaces sealed padding,</text>
    <text x="16" y="196" font-size="7.5" fill="#5A7A90">wicking moisture &amp; encouraging evaporation</text>

    <line x1="16" y1="207" x2="204" y2="207" stroke="#C4D4E0" stroke-width="0.5"/>

    <text x="16" y="225" font-size="8" font-weight="600" fill="#2A5A8C">Step-Powered Cooling</text>
    <text x="16" y="239" font-size="7.5" fill="#5A7A90">Walking compression pumps air —</text>
    <text x="16" y="251" font-size="7.5" fill="#5A7A90">no battery, no added hardware</text>

    <line x1="16" y1="262" x2="204" y2="262" stroke="#C4D4E0" stroke-width="0.5"/>

    <text x="16" y="280" font-size="8" font-weight="600" fill="#2A5A8C">Zero Added Complexity</text>
    <text x="16" y="294" font-size="7.5" fill="#5A7A90">Pure mechanical &amp; material solution</text>
  </g>

  <!-- Arrow to solution -->
  <line x1="1095" y1="310" x2="1132" y2="310" stroke="#2A5A8C" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="1132,305 1140,310 1132,315" fill="#2A5A8C"/>

  <!-- Center arrow between diamonds -->
  <line x1="584" y1="310" x2="604" y2="310" stroke="#2A5A8C" stroke-width="2"/>
  <polygon points="604,305 614,310 604,315" fill="#2A5A8C"/>

  <!-- Entry arrow -->
  <line x1="40" y1="310" x2="90" y2="310" stroke="#1A1814" stroke-width="1.5"/>
  <polygon points="90,305 100,310 90,315" fill="#1A1814"/>

</svg>
